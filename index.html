<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kilometer Tracker</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f6f8f9;
padding:20px;
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:18px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

h1{
text-align:center;
color:#2c7a7b;
margin-bottom:15px;
}

.total{
font-size:20px;
text-align:center;
margin:8px 0;
}

.input-row{
display:flex;
gap:8px;
align-items:center;
}

.input-row input{
flex:1;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

.input-row button{
padding:10px 14px;
background:#2c7a7b;
color:white;
border:none;
border-radius:6px;
font-size:14px;
white-space:nowrap;
cursor:pointer;
}

.input-row button:hover{
background:#256666;
}

.entry{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
font-size:14px;
}

.entry:last-child{
border-bottom:none;
}

</style>

</head>

<body>

<h1>Kilometer Tracker</h1>

<div class="card">

<div class="total">
Total KM: <b><span id="total">0</span></b>
</div>

<div class="total">
Monthly KM: <b><span id="monthly">0</span></b>
</div>

</div>

<div class="card">

<div class="input-row">

<input type="date" id="date">

<input type="number" id="km" placeholder="KM">

<button onclick="addEntry()">Add</button>

</div>

</div>

<div class="card">

<h3>Entries</h3>

<div id="list"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbw_hMU8GDj0EmRXwVgOlcY8xkwboIlykxYAyKOyKODvjOlwxJCzXKVnHS7sXTO71tZZbA/exec";

document.getElementById("date").valueAsDate = new Date();

function loadData(){

fetch(API)
.then(res => res.json())
.then(data => {

document.getElementById("total").innerText = data.total;

document.getElementById("monthly").innerText = data.monthlyTotal;

let html="";

data.entries.reverse().forEach(e=>{

html += `
<div class="entry">
<span>${e.date}</span>
<span>${e.km} km</span>
</div>
`;

});

document.getElementById("list").innerHTML = html;

});

}

function addEntry(){

let date = document.getElementById("date").value;
let km = document.getElementById("km").value;

if(km == "") return;

fetch(API + "?date=" + date + "&km=" + km)
.then(()=>{
document.getElementById("km").value="";
loadData();
});

}

.then(()=>{
document.getElementById("km").value="";
loadData();
});

}

loadData();

</script>

</body>


</html>
