<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kilometer Tracker</title>

<style>

body{
font-family:Arial;
background:#f6f8f9;
padding:20px;
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:18px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

h1{
text-align:center;
color:#2c7a7b;
}

.total{
font-size:20px;
text-align:center;
margin:8px 0;
}

.input-row{
display:flex;
gap:8px;
align-items:center;
}

.input-row input{
flex:1;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
}

.input-row button{
padding:10px 14px;
background:#2c7a7b;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.entry{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<h1>Kilometer Tracker</h1>

<div class="card">

<div class="total">
Total KM: <span id="total">0</span>
</div>

<div class="total">
Monthly KM: <span id="monthly">0</span>
</div>

</div>

<div class="card">

<div class="input-row">

<input type="date" id="date">

<input type="number" id="km" placeholder="KM">

<button onclick="addEntry()">Add</button>

</div>

</div>

<div class="card">

<h3>Entries</h3>

<div id="list"></div>

</div>

<script>

const API = "YOUR_SCRIPT_URL";

document.getElementById("date").valueAsDate = new Date();

function loadData(){

let script = document.createElement("script");

script.src = API + "?callback=handleData";

document.body.appendChild(script);

}

function handleData(data){

document.getElementById("total").innerText = data.total;

document.getElementById("monthly").innerText = data.monthlyTotal;

let html="";

data.entries.reverse().forEach(e=>{

html += `
<div class="entry">
<span>${e.date}</span>
<span>${e.km} km</span>
</div>
`;

});

document.getElementById("list").innerHTML = html;

}

function addEntry(){

let date = document.getElementById("date").value;
let km = document.getElementById("km").value;

if(km=="") return;

let script = document.createElement("script");

script.src = API + "?date=" + date + "&km=" + km + "&callback=loadData";

document.body.appendChild(script);

document.getElementById("km").value="";

}

loadData();

</script>

</body>
</html>
